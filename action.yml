name: "Dokploy Trigger and Poll"
description: "Triggers a Dokploy deployment and monitors the specific record by title, handling re-runs accurately"
inputs:
  dokploy-url:
    description: "The base URL of your Dokploy instance"
    required: true
  dokploy-api-key:
    description: "API Key for Dokploy"
    required: true
  dokploy-app-id:
    description: "The Application ID to deploy"
    required: true
  max-wait-minutes:
    description: "Maximum time to wait for deployment in minutes"
    required: false
    default: "10"

runs:
  using: "composite"
  steps:
    - name: Trigger and Poll Dokploy
      shell: bash
      run: |
        # Identify the current commit and message
        SHORT_SHA=$(git rev-parse --short HEAD)
        COMMIT_MSG=$(git log -1 --pretty=%s)

        # Use GITHUB_RUN_ATTEMPT to ensure re-runs get a unique title in Dokploy
        # This prevents the script from reading the status of a previous run
        RUN_ATTEMPT="${GITHUB_RUN_ATTEMPT:-1}"
        DEPLOY_TITLE="Build #$GITHUB_RUN_NUMBER.$RUN_ATTEMPT ($SHORT_SHA)"

        # Calculate max retries based on 10s intervals
        MAX_RETRIES=$((${{ inputs.max-wait-minutes }} * 6))

        echo "Initiating deployment for App ID: ${{ inputs.dokploy-app-id }}..."
        echo "Tracking ID: $DEPLOY_TITLE"

        # Triggering the Dokploy API
        curl -s -X 'POST' '${{ inputs.dokploy-url }}/api/application.deploy' \
          -H 'x-api-key: ${{ inputs.dokploy-api-key }}' \
          -H 'Content-Type: application/json' \
          -d "{
                \"applicationId\": \"${{ inputs.dokploy-app-id }}\",
                \"title\": \"$DEPLOY_TITLE\",
                \"description\": \"Attempt $RUN_ATTEMPT - Commit: $COMMIT_MSG\"
              }"

        echo "Deployment triggered. Monitoring for up to ${{ inputs.max-wait-minutes }} minutes..."

        # Initial wait for the system to register the request
        sleep 10 

        COUNT=0
        while [ $COUNT -lt $MAX_RETRIES ]; do
          # Fetch application details including deployment history
          RESPONSE=$(curl -s -X 'GET' "${{ inputs.dokploy-url }}/api/application.one?applicationId=${{ inputs.dokploy-app-id }}" \
            -H "x-api-key: ${{ inputs.dokploy-api-key }}")

          # Isolate the specific deployment entry matching our unique title
          DEPLOYMENT_ENTRY=$(echo "$RESPONSE" | jq -r --arg TITLE "$DEPLOY_TITLE" '.deployments[] | select(.title == $TITLE)')
          
          # Extract status and error message if applicable
          STATUS=$(echo "$DEPLOYMENT_ENTRY" | jq -r '.status // empty')

          if [ -z "$STATUS" ]; then
            echo "Status: Waiting for record '$DEPLOY_TITLE' to appear in Dokploy..."
          else
            echo "Current Status: $STATUS (Attempt $((COUNT + 1))/$MAX_RETRIES)"
            
            if [ "$STATUS" == "done" ]; then
              echo "Deployment successful for $SHORT_SHA (Run $RUN_ATTEMPT)!"
              exit 0
            elif [ "$STATUS" == "error" ]; then
              ERROR_MSG=$(echo "$DEPLOYMENT_ENTRY" | jq -r '.errorMessage // "Unknown error encountered"')
              echo "Deployment failed for $SHORT_SHA: $ERROR_MSG"
              exit 1
            elif [ "$STATUS" == "cancelled" ]; then
              echo "Deployment was manually cancelled in Dokploy."
              exit 1
            fi
          fi

          COUNT=$((COUNT + 1))
          sleep 10
        done

        echo "Deployment timed out after ${{ inputs.max-wait-minutes }} minutes."
        exit 1

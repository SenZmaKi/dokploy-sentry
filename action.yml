name: "Dokploy Trigger and Poll"
description: "Triggers a Dokploy deployment for an application or compose service and monitors it until completion"
inputs:
  dokploy-url:
    description: "The base URL of your Dokploy instance"
    required: true
  dokploy-api-key:
    description: "API Key for Dokploy"
    required: true
  dokploy-app-id:
    description: "The Application ID to deploy (mutually exclusive with dokploy-compose-id)"
    required: false
    default: ""
  dokploy-compose-id:
    description: "The Compose ID to deploy (mutually exclusive with dokploy-app-id)"
    required: false
    default: ""
  max-wait-minutes:
    description: "Maximum time to wait for deployment in minutes"
    required: false
    default: "5"

runs:
  using: "composite"
  steps:
    - name: Trigger and Poll Dokploy
      shell: bash
      run: |
        set -euo pipefail

        # ──────────────────────────────────────────────
        # Helpers
        # ──────────────────────────────────────────────

        require_non_empty() {
          local name="$1" value="$2"
          if [ -z "$value" ]; then
            echo "::error::Missing required input '$name'. Make sure the corresponding workflow input or secret is set."
            exit 1
          fi
        }

        # Extract a human-readable message from a JSON body.
        # Falls back to the raw body text, then to the supplied default.
        extract_error_message() {
          local body="$1" fallback="$2" extracted=""

          if printf '%s' "$body" | jq -e . >/dev/null 2>&1; then
            extracted=$(printf '%s' "$body" | jq -r '
              [.message?, .error?, .errorMessage?, .details?, .errors?[0]?.message?, .data?.message?]
              | map(select(type == "string" and length > 0))
              | .[0] // empty
            ' 2>/dev/null || true)
          fi

          if [ -n "$extracted" ]; then printf '%s\n' "$extracted"; return; fi
          if [ -n "$body" ];      then printf '%s\n' "$body" | tr '\n' ' ' | sed 's/[[:space:]]\+/ /g; s/^ //; s/ $//'; return; fi
          printf '%s\n' "$fallback"
        }

        # Perform a curl request and echo the response body to stdout.
        # Prints structured error details and exits 1 on any network or HTTP failure.
        api_request() {
          local method="$1" path="$2" payload="$3" context="$4"
          local response_file curl_error_file http_status curl_exit body curl_err_msg api_err_msg

          response_file=$(mktemp)
          curl_error_file=$(mktemp)

          set +e
          if [ -n "$payload" ]; then
            http_status=$(curl --silent --show-error --location \
              --request "$method" \
              --url "${DOKPLOY_URL}${path}" \
              --header "x-api-key: $DOKPLOY_API_KEY" \
              --header "Content-Type: application/json" \
              --data "$payload" \
              --output "$response_file" \
              --write-out "%{http_code}" \
              2>"$curl_error_file")
          else
            http_status=$(curl --silent --show-error --location \
              --request "$method" \
              --url "${DOKPLOY_URL}${path}" \
              --header "x-api-key: $DOKPLOY_API_KEY" \
              --output "$response_file" \
              --write-out "%{http_code}" \
              2>"$curl_error_file")
          fi
          curl_exit=$?
          set -e

          body=$(cat "$response_file")
          curl_err_msg=$(cat "$curl_error_file")
          rm -f "$response_file" "$curl_error_file"

          if [ "$curl_exit" -ne 0 ]; then
            [ -z "$curl_err_msg" ] && curl_err_msg=$(extract_error_message "$body" "curl exited with code $curl_exit.")
            echo "::error::❌ $context — network error (curl exit $curl_exit)"
            echo "::error::   Detail: $curl_err_msg"
            exit 1
          fi

          if [ "$http_status" -lt 200 ] || [ "$http_status" -ge 300 ]; then
            api_err_msg=$(extract_error_message "$body" "No additional detail returned.")
            echo "::error::❌ $context — HTTP $http_status"
            echo "::error::   URL   : ${DOKPLOY_URL}${path}"
            echo "::error::   Status: $http_status"
            echo "::error::   Body  : $body"
            echo "::error::   Detail: $api_err_msg"
            exit 1
          fi

          printf '%s' "$body"
        }

        # ──────────────────────────────────────────────
        # Pre-flight checks
        # ──────────────────────────────────────────────

        if ! command -v jq >/dev/null 2>&1; then
          echo "::error::This action requires jq, but it is not available on the runner."
          exit 1
        fi

        if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
          echo "::error::Git metadata is unavailable. Add actions/checkout before this action so commit details can be read."
          exit 1
        fi

        DOKPLOY_URL="${{ inputs.dokploy-url }}"
        DOKPLOY_API_KEY="${{ inputs.dokploy-api-key }}"
        DOKPLOY_APP_ID="${{ inputs.dokploy-app-id }}"
        DOKPLOY_COMPOSE_ID="${{ inputs.dokploy-compose-id }}"
        MAX_WAIT_MINUTES="${{ inputs.max-wait-minutes }}"

        require_non_empty "dokploy-url"      "$DOKPLOY_URL"
        require_non_empty "dokploy-api-key"  "$DOKPLOY_API_KEY"
        require_non_empty "max-wait-minutes" "$MAX_WAIT_MINUTES"

        if [ -z "$DOKPLOY_APP_ID" ] && [ -z "$DOKPLOY_COMPOSE_ID" ]; then
          echo "::error::You must provide exactly one of 'dokploy-app-id' or 'dokploy-compose-id'."
          exit 1
        fi

        if [ -n "$DOKPLOY_APP_ID" ] && [ -n "$DOKPLOY_COMPOSE_ID" ]; then
          echo "::error::'dokploy-app-id' and 'dokploy-compose-id' are mutually exclusive — provide only one."
          exit 1
        fi

        case "$MAX_WAIT_MINUTES" in
          ''|*[!0-9]*) echo "::error::Input 'max-wait-minutes' must be a positive integer."; exit 1 ;;
        esac
        if [ "$MAX_WAIT_MINUTES" -lt 1 ]; then
          echo "::error::Input 'max-wait-minutes' must be at least 1."
          exit 1
        fi

        DOKPLOY_URL="${DOKPLOY_URL%/}"

        # ──────────────────────────────────────────────
        # Shared deployment metadata
        # Both application.deploy and compose.deploy accept title + description.
        # ──────────────────────────────────────────────

        SHORT_SHA=$(git rev-parse --short HEAD)
        COMMIT_MSG=$(git log -1 --pretty=%s)
        RUN_ATTEMPT="${GITHUB_RUN_ATTEMPT:-1}"
        BUILD_NUMBER="${GITHUB_RUN_NUMBER:-0}.${RUN_ATTEMPT}"
        DEPLOY_TITLE="${COMMIT_MSG} (${SHORT_SHA})"
        DEPLOY_DESCRIPTION="Build #${BUILD_NUMBER} | Commit: ${SHORT_SHA}"
        MAX_RETRIES=$((MAX_WAIT_MINUTES * 6))
        TRIGGER_EPOCH=$(date -u +%s)

        echo "Title      : ${DEPLOY_TITLE}"
        echo "Description: ${DEPLOY_DESCRIPTION}"

        # ──────────────────────────────────────────────
        # Trigger — set type-specific paths and ID field,
        # then build the payload and poll path uniformly.
        # ──────────────────────────────────────────────

        if [ -n "$DOKPLOY_APP_ID" ]; then
          DEPLOY_TYPE="application"
          DEPLOY_ID="$DOKPLOY_APP_ID"
          TRIGGER_PATH="/api/application.deploy"
          POLL_PATH="/api/deployment.all?applicationId=${DEPLOY_ID}"
          TRIGGER_PAYLOAD=$(jq -cn \
            --arg applicationId "$DEPLOY_ID" \
            --arg title         "$DEPLOY_TITLE" \
            --arg description   "$DEPLOY_DESCRIPTION" \
            '{applicationId: $applicationId, title: $title, description: $description}')
        else
          DEPLOY_TYPE="compose"
          DEPLOY_ID="$DOKPLOY_COMPOSE_ID"
          TRIGGER_PATH="/api/compose.deploy"
          POLL_PATH="/api/deployment.allByCompose?composeId=${DEPLOY_ID}"
          TRIGGER_PAYLOAD=$(jq -cn \
            --arg composeId   "$DEPLOY_ID" \
            --arg title       "$DEPLOY_TITLE" \
            --arg description "$DEPLOY_DESCRIPTION" \
            '{composeId: $composeId, title: $title, description: $description}')
        fi

        echo "::notice::Triggering Dokploy ${DEPLOY_TYPE} deployment for '${DEPLOY_ID}'."
        api_request "POST" "$TRIGGER_PATH" "$TRIGGER_PAYLOAD" "Triggering ${DEPLOY_TYPE} deployment" >/dev/null
        echo "Dokploy accepted the request. Monitoring for up to ${MAX_WAIT_MINUTES} minute(s)..."
        sleep 10

        # ──────────────────────────────────────────────
        # Poll loop — shared for both application and compose.
        # Matches by title + description first; falls back to
        # timestamp in case the server ignores extra fields.
        # ──────────────────────────────────────────────

        COUNT=0
        while [ "$COUNT" -lt "$MAX_RETRIES" ]; do
          RESPONSE=$(api_request "GET" "$POLL_PATH" "" "Fetching ${DEPLOY_TYPE} deployments")

          DEPLOYMENT_ENTRY=$(
            printf '%s' "$RESPONSE" | jq -c \
              --argjson EPOCH       "$TRIGGER_EPOCH" \
              --arg     TITLE       "$DEPLOY_TITLE" \
              --arg     DESCRIPTION "$DEPLOY_DESCRIPTION" \
              '
                (if type == "array" then . else .deployments // [] end) as $deps
                | ($deps | map(select(.title == $TITLE and ((.description // "") == $DESCRIPTION))) | first)
                  // ($deps
                       | map(select(
                           .createdAt != null and
                           ((.createdAt | split(".")[0] | strptime("%Y-%m-%dT%H:%M:%S") | mktime) >= $EPOCH)
                         ))
                       | sort_by(.createdAt) | last)
                  // empty
              '
          )

          if [ -z "$DEPLOYMENT_ENTRY" ]; then
            echo "Status: waiting for Dokploy to register the new deployment record... ($((COUNT + 1))/${MAX_RETRIES})"
          else
            STATUS=$(printf '%s' "$DEPLOYMENT_ENTRY" | jq -r '.status // empty')
            echo "Status: ${STATUS:-unknown} ($((COUNT + 1))/${MAX_RETRIES})"

            case "$STATUS" in
              done)
                echo "::notice::✅ Deployment completed successfully for ${SHORT_SHA}."
                exit 0
                ;;
              error)
                LOG_PATH=$(printf '%s' "$DEPLOYMENT_ENTRY" | jq -r '.logPath // empty')
                API_ERR=$(extract_error_message "$DEPLOYMENT_ENTRY" "Dokploy marked the deployment as failed.")
                echo "::error::❌ Deployment failed for ${SHORT_SHA}"
                echo "::error::   Status  : error"
                echo "::error::   Detail  : $API_ERR"
                [ -n "$LOG_PATH" ] && echo "::error::   Log path: $LOG_PATH"
                echo "::error::   Full record: $(printf '%s' "$DEPLOYMENT_ENTRY" | jq -c .)"
                exit 1
                ;;
              cancelled)
                API_ERR=$(extract_error_message "$DEPLOYMENT_ENTRY" "The deployment was cancelled in Dokploy.")
                echo "::error::❌ Deployment cancelled for ${SHORT_SHA}"
                echo "::error::   Status : cancelled"
                echo "::error::   Detail : $API_ERR"
                echo "::error::   Full record: $(printf '%s' "$DEPLOYMENT_ENTRY" | jq -c .)"
                exit 1
                ;;
            esac
          fi

          COUNT=$((COUNT + 1))
          sleep 10
        done

        echo "::error::❌ Deployment timed out after ${MAX_WAIT_MINUTES} minute(s)."
        echo "::error::   Deploy type: ${DEPLOY_TYPE} | ID: ${DEPLOY_ID}"
        exit 1
